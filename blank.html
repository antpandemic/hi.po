<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #FFFDEC;
      color: #3a3530;
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, rgba(255,207,207,0.55) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      animation: fadeIn 0.6s ease both;
      position: relative;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .code {
      font-size: 96px;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      color: #FFCFCF;
      line-height: 1;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #9a9188;
      margin-bottom: 32px;
    }

    a {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #86A788;
      text-decoration: none;
      border-bottom: 1px solid rgba(134,167,136,0.35);
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }
    a:hover { border-color: #86A788; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">403</div>
    <h1>Access Denied</h1>
    <a href="index.html">← Go back</a>
  </div>
</body>
</html>
